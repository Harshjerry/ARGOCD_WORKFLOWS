apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-generator-ex1
  namespace: argocd
spec:
  generators:
  - clusters: {} #it will take all cluster from argocd cluseter list and create applicaiton for each  
  template:
    metadata:
      name: '{{name}}-application'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/devjerry04/test_application.git
        targetRevision: main
        path:   manifest
      destination:
        server: '{{server}}'
        namespace: cluster-generator
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true 