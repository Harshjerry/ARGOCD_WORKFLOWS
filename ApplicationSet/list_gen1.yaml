apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: list-generator-ex1
  namespace: argocd
spec:
  generators:
  - list: #contains a list of cluster 
      elements:
      - cluster: local
        url: https://kubernetes.default.svc
        path: manifest
      # - cluster: external
      #   url: https://192.168.64.93:6443
      #   path: manifest    #can be different path for different cluster , take it as variable for path defined for each application 
  template:
    metadata:
      name: '{{cluster}}-application'
    spec:
      project: default
      source:
        repoURL: https://github.com/devjerry04/test_application.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: '{{url}}'
        namespace: '{{cluster}}'
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true