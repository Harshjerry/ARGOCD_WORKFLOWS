apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-generator-ex3
  namespace: argocd
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          environment: staging
      values:
        path: manifest 
        namespace: staging-ns
  - clusters:
      selector:
        matchLabels:
          environment: pre-staging
      values:
        path: directoryOfmanifests
        namespace: pre-staging-ns
  template:
    metadata:
      name: '{{name}}-application'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/devjerry04/test_application.git
        targetRevision: main
        path: '{{values.path}}'
      destination:
        server: '{{server}}'
        namespace: '{{values.namespace}}'
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true