apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-generator-ex2
  namespace: argocd
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          argocd.argoproj.io/secret-type: cluster  ##label specified cluster only considered 
          environment: staging  #our label for cluster , specify in cluster secret.yaml or manually 
 #  but  this label  doesnot match local cluster  ,  so u can generate secet for  lcoal too 
  template:
    metadata:
      name: '{{name}}-application'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/devjerry04/test_application.git
        targetRevision: main
        path: manifest
      destination:
        server: '{{server}}'
        namespace: cluster-generator
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true