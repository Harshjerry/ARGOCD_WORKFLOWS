apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: merge-generator-ex1
spec:
  generators:
    - merge:
        mergeKeys:
          - server
        generators: # 3 different generators with different selectors and values
          - clusters:   #base generator with no selector, so it applies to all clusters
              values:
                tag: '1.23'
                replicas: '1'
          - clusters:  #overrides template values for clusters with label environment: staging
              selector:
                matchLabels:
                  environment: 'staging'
              values:
                tag: '1.24'
          - list: #overrides template values for specific cluster with server url https://kubernetes.default.svc
              elements: 
                - server: https://kubernetes.default.svc
                  values.replicas: '3'
  template:
    metadata:
      name: '{{name}}-application'
    spec:
      project: default
      source:
        repoURL: https://github.com/devopshobbies/argocd-tutorial.git
        targetRevision: main
        path: v03-argocd-applications/helm/nginx
        helm:
          parameters:
            - name: "image.tag"  #replace the value of tag in helm chart with the value defined in generator, it will take 1.23 for all cluster, but for staging cluster it will take 1.24 and for cluster with url https://kubernetes.default.svc it will take 1.23 as there is no override for tag in list generator
              value: '{{values.tag}}'
            - name: "replicaCount"
              value: '{{values.replicas}}'
      destination:
        server: '{{server}}'
        namespace: '{{metadata.labels.environment}}'
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true