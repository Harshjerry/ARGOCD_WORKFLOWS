apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: matrix-generator-ex1
  namespace: argocd
spec:
  generators:
  - matrix:
      generators:
          # git for difernet application and cluster for different clusters  
          - git:
             repoURL: https://github.com/devopshobbies/argocd-tutorial.git
             revision: main
             directories:
              - path: v09-argocd-applicationSet-1/git-generator/resources/*  
          - clusters: {} #it will take all cluster from argocd cluseter list and create applicaiton for each
  template:
    metadata:
      name: '{{path.basename}}-{{cluster.name}}-application'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/devjerry04/test_application.git
        targetRevision: main
        path:   '{{path}}'
      destination:
        server: '{{server}}'
        namespace: '{{metadata.labels.environment}}'
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true 