
#4 replace sync option
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: automated-sync-app-1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devjerry04/test_application.git
    targetRevision: main
    path: manifest 
  destination:
    server: https://kubernetes.default.svc
    namespace: test-ns
  syncPolicy:
    syncOptions:
      CreateNamespace=true  #if the namespace defined in destination does not exist, it will automatically create the namespace before applying the resources, this is useful when you want to ensure that the namespace is created before applying the resources and to avoid any errors when the namespace does not exist.






